name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go tests: ingestion ───────────────────────────────────────────────────────
  test-go-ingestion:
    name: Go tests (ingestion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ingestion/go.mod
          cache: true
          cache-dependency-path: ingestion/go.sum

      - name: Run tests
        run: cd ingestion && go test ./... -v

  # ── Go tests: api ─────────────────────────────────────────────────────────────
  test-go-api:
    name: Go tests (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run tests
        run: cd api && go test ./... -v

  # ── Python tests: training ────────────────────────────────────────────────────
  test-python:
    name: Python tests (training)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install \
            pandas==2.2.3 \
            numpy==1.26.4 \
            scikit-learn==1.5.2 \
            xgboost==3.2.0 \
            mlflow==3.11.1 \
            pytest

      - name: Run tests
        run: cd training && python -m pytest tests/ -v

  # ── Docker build: ingestion ───────────────────────────────────────────────────
  # Runs only on push to main (not on PRs) and only after tests pass.
  docker-ingestion:
    name: Docker build — ingestion
    runs-on: ubuntu-latest
    needs: [test-go-ingestion]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t six-eyes-ingestion:${{ github.sha }} ingestion/

  # ── Docker build: api ─────────────────────────────────────────────────────────
  docker-api:
    name: Docker build — api
    runs-on: ubuntu-latest
    needs: [test-go-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t six-eyes-api:${{ github.sha }} api/
